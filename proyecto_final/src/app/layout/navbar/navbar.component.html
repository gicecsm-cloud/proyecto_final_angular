<!--
  Objetivo del ejercicio:
  Practicar navegacion declarativa con routerLink dentro de un sidebar vertical.

  Que debe implementar el estudiante:
  Agregar un item nuevo cuando cree una ruta nueva.

  Resultado esperado:
  Al hacer clic en cada enlace, Angular cambia la pagina sin recargar el navegador.
-->
<aside class="sidebar" aria-label="Navegacion principal">
  <a class="brand" routerLink="/">
    <span class="brand-mark">A</span>
    <span>
      <strong>Angular</strong>
      <small>Academico</small>
    </span>
  </a>

  <div class="sidebar-section">
    <span class="section-label">Temas de clase</span>

    @for (item of navItems; track item.path) {
      <a
        class="nav-item"
        [routerLink]="item.path"
        routerLinkActive="active"
        [routerLinkActiveOptions]="{ exact: item.path === '/' }"
      >
        <span class="nav-icon">{{ item.icon }}</span>
        <span class="nav-text">{{ item.label }}</span>
      </a>
    }
  </div>

</aside>
